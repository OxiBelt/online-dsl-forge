name: Release online-dsl-forge

on:
  release:
    types: [published]
  push:
    tags:
      - "*.*.*-build.*"

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"

jobs:
  validate:
    name: Validate crate release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0
          rustup component add rustfmt clippy --toolchain 1.96.0

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply release version
        run: pnpm run versioning:release
        env:
          ONLINE_DSL_FORGE_RELEASE_REF: ${{ github.ref }}

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Tests rustfmt
        run: tests/scripts/check-tests-rustfmt.sh

      - name: Rust module size
        run: tests/scripts/check-rust-module-size.sh

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Cargo test
        run: cargo test --all-features --locked

      - name: Verify release worktree changes
        shell: bash
        run: |
          set -euo pipefail

          git diff --check HEAD --

          expected_files="$(mktemp)"
          actual_files="$(mktemp)"
          printf '%s\n' Cargo.lock source/Cargo.toml > "$expected_files"
          git diff --name-only HEAD -- Cargo.lock source/Cargo.toml | sort > "$actual_files"
          diff -u "$expected_files" "$actual_files"

          unexpected_files="$(git diff --name-only HEAD -- . ':(exclude)Cargo.lock' ':(exclude)source/Cargo.toml')"
          if [[ -n "$unexpected_files" ]]; then
            echo "unexpected release worktree changes:" >&2
            printf '%s\n' "$unexpected_files" >&2
            exit 1
          fi

          untracked_crate_files="$(git ls-files --others --exclude-standard source)"
          if [[ -n "$untracked_crate_files" ]]; then
            echo "unexpected untracked crate files:" >&2
            printf '%s\n' "$untracked_crate_files" >&2
            exit 1
          fi

      - name: Crate publish dry run
        run: cargo publish --manifest-path source/Cargo.toml --locked --allow-dirty --dry-run

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-cargo-metadata
          path: |
            Cargo.lock
            source/Cargo.toml
          if-no-files-found: error
          retention-days: 1

  crates-io:
    name: Publish crate to crates.io
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0

      - name: Download release metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-cargo-metadata
          path: release-cargo-metadata

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail

          actual_files="$(mktemp)"
          expected_files="$(mktemp)"
          find release-cargo-metadata -type f -printf '%P\n' | sort > "$actual_files"
          printf '%s\n' Cargo.lock source/Cargo.toml > "$expected_files"
          diff -u "$expected_files" "$actual_files"

          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" == "$GITHUB_REF" ]]; then
            echo "release ref must start with refs/tags/: $GITHUB_REF" >&2
            exit 1
          fi

          version="${tag#v}"
          if [[ "$version" == *+* ]]; then
            echo "Cargo release tags must not contain build metadata: $tag" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "release tag must be valid SemVer: $tag" >&2
            exit 1
          fi

          expected_dir="$(mktemp -d)"
          mkdir -p "$expected_dir/source"
          cp Cargo.lock "$expected_dir/Cargo.lock"
          cp source/Cargo.toml "$expected_dir/source/Cargo.toml"

          python3 - "$expected_dir" "$version" <<'PY'
          import pathlib
          import re
          import sys

          expected_dir = pathlib.Path(sys.argv[1])
          version = sys.argv[2]
          manifest_path = expected_dir / "source" / "Cargo.toml"
          lockfile_path = expected_dir / "Cargo.lock"

          manifest = manifest_path.read_text()
          next_manifest = re.sub(
              r'(?m)^version\s*=\s*"0\.0\.0"\s*$',
              f'version = "{version}"',
              manifest,
              count=1,
          )
          if next_manifest == manifest:
              raise SystemExit('source/Cargo.toml must contain version = "0.0.0"')

          publishable_manifest = re.sub(
              r'(?m)^publish\s*=\s*false\s*\r?\n',
              '',
              next_manifest,
              count=1,
          )
          if publishable_manifest == next_manifest:
              raise SystemExit('source/Cargo.toml must contain publish = false before release')

          manifest_path.write_text(publishable_manifest)

          lockfile = lockfile_path.read_text()
          next_lockfile = re.sub(
              r'(?m)(^\[\[package\]\]\nname = "online-dsl-forge"\nversion = ")0\.0\.0(")',
              rf'\g<1>{version}\2',
              lockfile,
              count=1,
          )
          if next_lockfile == lockfile:
              raise SystemExit('Cargo.lock must contain online-dsl-forge version = "0.0.0"')

          lockfile_path.write_text(next_lockfile)
          PY

          diff -u "$expected_dir/Cargo.lock" release-cargo-metadata/Cargo.lock
          diff -u "$expected_dir/source/Cargo.toml" release-cargo-metadata/source/Cargo.toml

          cp release-cargo-metadata/Cargo.lock Cargo.lock
          cp release-cargo-metadata/source/Cargo.toml source/Cargo.toml

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Re-verify release worktree changes
        shell: bash
        run: |
          set -euo pipefail

          git diff --check HEAD --

          expected_files="$(mktemp)"
          actual_files="$(mktemp)"
          printf '%s\n' Cargo.lock source/Cargo.toml > "$expected_files"
          git diff --name-only HEAD -- Cargo.lock source/Cargo.toml | sort > "$actual_files"
          diff -u "$expected_files" "$actual_files"

          unexpected_files="$(git diff --name-only HEAD -- . ':(exclude)Cargo.lock' ':(exclude)source/Cargo.toml')"
          if [[ -n "$unexpected_files" ]]; then
            echo "unexpected release worktree changes:" >&2
            printf '%s\n' "$unexpected_files" >&2
            exit 1
          fi

          untracked_crate_files="$(git ls-files --others --exclude-standard source)"
          if [[ -n "$untracked_crate_files" ]]; then
            echo "unexpected untracked crate files:" >&2
            printf '%s\n' "$untracked_crate_files" >&2
            exit 1
          fi

      - name: Publish crate
        run: cargo publish --manifest-path source/Cargo.toml --locked --allow-dirty --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
